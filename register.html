
 

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - CO-PO Portal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* BACKGROUND */
body {
    background: linear-gradient(135deg, #e3f2fd, #f3e5f5);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* FLOATING MEMES */
.memes span {
    position: absolute;
    font-size: 35px;
    opacity: 0.2;
    animation: float 12s linear infinite;
}

.memes span:nth-child(1){ left:5%; animation-duration:8s;}
.memes span:nth-child(2){ left:15%; animation-duration:12s;}
.memes span:nth-child(3){ left:25%; animation-duration:10s;}
.memes span:nth-child(4){ left:40%; animation-duration:14s;}
.memes span:nth-child(5){ left:55%; animation-duration:9s;}
.memes span:nth-child(6){ left:70%; animation-duration:13s;}
.memes span:nth-child(7){ left:85%; animation-duration:11s;}
.memes span:nth-child(8){ left:95%; animation-duration:15s;}

@keyframes float {
    0% { top: 100%; transform: rotate(0deg);}
    100% { top: -10%; transform: rotate(360deg);}
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
}

nav a {
    margin-left: 15px;
    text-decoration: none;
    color: #333;
    font-weight: 500;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* REGISTER BOX */
.register-box {
    width: 350px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 20px;
    background: #6c9cff;
    color: white;
    margin-top: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* LINKS */
.links {
    margin-top: 10px;
    font-size: 14px;
}

.links a {
    text-decoration: none;
    color: #6c9cff;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<!-- FLOATING MEMES -->
<div class="memes">
    <span>💻</span>
    <span>📚</span>
    <span>🧠</span>
    <span>🎓</span>
    <span>📊</span>
    <span>⌨️</span>
    <span>📝</span>
    <span>📡</span>
</div>

<!-- NAVBAR -->
<nav>
    <h2>✨ CO-PO Portal</h2>
    <div>
        <a href="homepage.html">🏠 Home</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<!-- MAIN -->
<div class="main">

    <div class="register-box">
        <h2>Create Account 📝</h2>

        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">

        <button>Register</button>

        <!-- LOGIN LINK -->
        <div class="links">
            Already have an account? <a href="login.html">Login</a>
        </div>

        <!-- BACK BUTTON -->
        
    </div>

</div>

<!-- FOOTER -->
<footer>
    © 2026 CO-PO Portal | Designed by 🐻‍❄️
</footer>

</body>
</html>
